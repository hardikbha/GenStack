# XGenDet Stage 2 Training Configuration (MLLM Explainability)

# Model
model:
  name: "Qwen/Qwen2.5-VL-7B-Instruct"
  lora_r: 16
  lora_alpha: 32
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  max_new_tokens: 512

# Training
training:
  lr: 2e-5
  weight_decay: 0.05
  epochs: 3
  batch_size: 1
  grad_accum: 8            # Effective batch size = 8
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  seed: 42

# Data
data:
  annotation_file: "./data/annotations/train.jsonl"
  val_annotation_file: "./data/annotations/val.jsonl"
  image_root: "/home/sachin.chaudhary/GTA"
  heatmap_root: "./data/heatmaps"

# Annotation pipeline
annotation:
  gpt_model: "gpt-4o"
  num_threads: 4
  max_images: 50000

# Output
output:
  output_dir: "./checkpoints/stage2"
  exp_name: "xgendet_stage2_qwen"
  save_steps: 500
  log_steps: 50
